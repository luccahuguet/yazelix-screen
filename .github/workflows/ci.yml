name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
      - run: cargo check --examples
      - run: cargo test
      - run: cargo run --bin yzs -- --help
      - run: cargo run --example render_once > /tmp/yzs_frame.txt

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix flake check
      - run: nix build .#yzs --no-link
      - run: nix run .#yzs -- --help
